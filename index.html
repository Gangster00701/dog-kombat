<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dog Kombat</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #2b2b2b, #000);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
}

h1 {
    margin-top: 20px;
}

#score {
    font-size: 40px;
    margin: 10px 0;
}

#energy, #hp {
    font-size: 16px;
    opacity: 0.8;
}

#dog {
    width: 220px;
    margin-top: 30px;
    cursor: pointer;
    transition: transform 0.1s;
    user-select: none;
}

#dog:active {
    transform: scale(0.9);
}

button {
    margin-top: 20px;
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff4444;
    color: white;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
}

.hit {
    animation: hitAnim 0.2s;
}

@keyframes hitAnim {
    0% { transform: scale(1); }
    50% { transform: scale(1.1) rotate(5deg); }
    100% { transform: scale(1); }
}
</style>
</head>

<body>

<h1>🐶 Dog Kombat</h1>

<div id="score">Score: 0</div>
<div id="hp">HP: 100</div>
<div id="energy">Energy: 100</div>

<img id="dog" src="https://i.imgur.com/4M34hi2.png" alt="dog">

<br>

<button onclick="attack()">ATTACK 💥</button>

<script>
let score = localStorage.getItem("score") ? parseInt(localStorage.getItem("score")) : 0;
let hp = 100;
let energy = 100;

const scoreEl = document.getElementById("score");
const hpEl = document.getElementById("hp");
const energyEl = document.getElementById("energy");
const dog = document.getElementById("dog");

function update() {
    scoreEl.innerText = "Score: " + score;
    hpEl.innerText = "HP: " + hp;
    energyEl.innerText = "Energy: " + energy;
    localStorage.setItem("score", score);
}

function attack() {
    if (energy <= 0 || hp <= 0) return;

    let damage = Math.floor(Math.random() * 10) + 5;
    score += damage;
    energy -= 10;
    hp -= Math.floor(Math.random() * 5);

    dog.classList.add("hit");
    setTimeout(() => dog.classList.remove("hit"), 200
